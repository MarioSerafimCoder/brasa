<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrindo BRasa</title>
    <style>
        *,
        *::before,
        *::after{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        html,
        body{
            width:100%;
            min-height:100%;
            overflow:hidden;
            background:#050505;
            color:#fff;
            font-family:Inter, Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:grid;
            place-items:center;
            background:
                radial-gradient(circle at 50% 45%, rgba(249, 81, 22, .18), transparent 32%),
                linear-gradient(180deg, #050505, #0B0B0C 58%, #050505);
        }

        .loader{
            width:min(680px, 82vw);
            display:grid;
            place-items:center;
            gap:1.4rem;
            text-align:center;
        }

        .loader__logo{
            width:min(420px, 68vw);
            height:auto;
            filter:drop-shadow(0 28px 80px rgba(249, 81, 22, .22));
            animation:logo-in .7s cubic-bezier(.22, 1, .36, 1) both;
        }

        .loader__bar{
            width:min(360px, 58vw);
            height:4px;
            border-radius:999px;
            overflow:hidden;
            background:rgba(255,255,255,.12);
        }

        .loader__bar span{
            display:block;
            width:42%;
            height:100%;
            border-radius:inherit;
            background:linear-gradient(90deg, #ff3d13, #ff8a1c);
            transform-origin:left center;
            animation:progress 1.25s cubic-bezier(.22, 1, .36, 1) infinite alternate;
        }

        p{
            min-height:1.25rem;
            color:rgba(255,255,255,.66);
            font-size:.92rem;
            font-weight:700;
        }

        @keyframes logo-in{
            from{ opacity:0; transform:translateY(12px) scale(.96); filter:blur(10px); }
            to{ opacity:1; transform:translateY(0) scale(1); filter:drop-shadow(0 28px 80px rgba(249, 81, 22, .22)); }
        }

        @keyframes progress{
            from{ transform:translateX(-70%) scaleX(.68); }
            to{ transform:translateX(150%) scaleX(1); }
        }

        @media (prefers-reduced-motion:reduce){
            .loader__logo,
            .loader__bar span{
                animation:none;
            }

            .loader__bar span{
                width:100%;
                transform:none;
            }
        }
    </style>
</head>

<body>
    <main class="loader" aria-label="Abrindo BRasa">
        <img class="loader__logo" src="Logo/Logo%20colorida.png" alt="BRasa">
        <div class="loader__bar" aria-hidden="true"><span></span></div>
        <p id="status">Preparando biblioteca...</p>
    </main>

    <script>
        const target = "http://127.0.0.1:4173/?opened=" + Date.now();
        const startedAt = Date.now();
        const minVisibleMs = 900;
        const status = document.getElementById("status");

        async function tryOpen() {
            try {
                await fetch(target, {
                    cache: "no-store",
                    mode: "no-cors"
                });

                const elapsed = Date.now() - startedAt;
                window.setTimeout(() => {
                    window.location.href = target;
                }, Math.max(0, minVisibleMs - elapsed));
            } catch {
                status.textContent = "Iniciando BRasa...";
                window.setTimeout(tryOpen, 450);
            }
        }

        window.setTimeout(tryOpen, 300);
    </script>
</body>

</html>
