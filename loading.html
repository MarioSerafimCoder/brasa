<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrindo BRasa</title>
    <style>
        *,
        *::before,
        *::after{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        html,
        body{
            width:100%;
            min-height:100%;
            overflow:hidden;
            background:#050505;
            color:#fff;
            font-family:Inter, Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:grid;
            place-items:center;
            background:
                radial-gradient(circle at 50% 45%, rgba(249, 81, 22, .18), transparent 32%),
                linear-gradient(180deg, #050505, #0B0B0C 58%, #050505);
        }

        .loader{
            width:min(680px, 82vw);
            display:grid;
            place-items:center;
            gap:1.4rem;
            text-align:center;
        }

        .loader__logo{
            width:min(420px, 68vw);
            height:auto;
            filter:drop-shadow(0 28px 80px rgba(249, 81, 22, .22));
            animation:logo-in .7s cubic-bezier(.22, 1, .36, 1) both;
        }

        .loader__bar{
            width:min(360px, 58vw);
            height:4px;
            border-radius:999px;
            overflow:hidden;
            background:rgba(255,255,255,.12);
        }

        .loader__bar span{
            display:block;
            width:8%;
            height:100%;
            border-radius:inherit;
            background:linear-gradient(90deg, #ff3d13, #ff8a1c);
            transform-origin:left center;
            transition:width .35s ease;
        }

        p{
            min-height:1.25rem;
            color:rgba(255,255,255,.66);
            font-size:.92rem;
            font-weight:700;
        }

        @keyframes logo-in{
            from{ opacity:0; transform:translateY(12px) scale(.96); filter:blur(10px); }
            to{ opacity:1; transform:translateY(0) scale(1); filter:drop-shadow(0 28px 80px rgba(249, 81, 22, .22)); }
        }

        @media (prefers-reduced-motion:reduce){
            .loader__logo,
            .loader__bar span{
                animation:none;
            }

            .loader__bar span{ transform:none; }
        }
    </style>
</head>

<body>
    <main class="loader" aria-label="Abrindo BRasa">
        <img class="loader__logo" src="Logo/Logo%20colorida.png" alt="BRasa">
        <div class="loader__bar" role="progressbar" aria-label="Preparação da biblioteca" aria-valuemin="0" aria-valuemax="100" aria-valuenow="8"><span></span></div>
        <p id="status" aria-live="polite">Iniciando BRasa...</p>
    </main>

    <script>
        const defaultOrigin = "http://127.0.0.1:4173";
        const status = document.getElementById("status");
        const progress = document.querySelector(".loader__bar");
        const bar = progress.querySelector("span");
        let failures = 0;

        async function connectHostedLoading() {
            try {
                await fetch(defaultOrigin, { cache: "no-store", mode: "no-cors" });
                location.replace(`${defaultOrigin}/loading.html`);
            } catch {
                status.textContent = "Iniciando BRasa...";
                window.setTimeout(connectHostedLoading, 350);
            }
        }

        async function pollStatus() {
            try {
                const response = await fetch("/api/sync/status", { cache: "no-store" });
                if (!response.ok) throw new Error();
                const sync = await response.json(); failures = 0;
                const percentage = sync.state === "complete" ? 100 : Math.max(8, Number(sync.progress || (sync.state === "syncing" ? 16 : 10)));
                bar.style.width = `${percentage}%`; progress.setAttribute("aria-valuenow", String(percentage));
                status.textContent = sync.message || (sync.state === "syncing" ? "Verificando biblioteca..." : "Iniciando BRasa...");
                if (sync.state === "complete") { status.textContent = "Biblioteca pronta."; return setTimeout(() => location.replace(`/?opened=${Date.now()}`), 350); }
                if (sync.state === "error") { status.textContent = "Biblioteca pronta em modo parcial."; return setTimeout(() => location.replace(`/?opened=${Date.now()}&library=partial`), 1200); }
                setTimeout(pollStatus, 300);
            } catch {
                failures++; status.textContent = failures > 20 ? "Ainda estamos preparando o BRasa..." : "Iniciando BRasa...";
                setTimeout(pollStatus, Math.min(1200, 250 + failures * 50));
            }
        }

        if (location.protocol === "file:") connectHostedLoading(); else pollStatus();
    </script>
</body>

</html>
