<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRasa - Filmes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css?v=streaming-20260709a">
    <link rel="stylesheet" href="../css/style.css?v=streaming-20260709a">
    <link rel="stylesheet" href="../css/library.css?v=streaming-20260709a">
</head>
<body>
    <div class="page-shell">
        <aside class="page-sidebar">
            <div class="page-sidebar__logo">BRasa</div>
            <nav>
                <a href="../index.html"><i data-lucide="house"></i>Início</a>
                <a href="search.html"><i data-lucide="search"></i>Buscar</a>
                <a class="active" href="movies.html"><i data-lucide="film"></i>Filmes</a>
                <a href="series.html"><i data-lucide="tv"></i>Séries</a>
                <a href="collection.html"><i data-lucide="library"></i>Coleções</a>
                <a href="settings.html"><i data-lucide="settings"></i>Configurações</a>
            </nav>
        </aside>

        <main class="page-main">
            <section class="library-page">
                <header class="library-header">
                    <div>
                        <p class="library-kicker">Filmes</p>
                        <h1 class="library-title">Biblioteca</h1>
                        <p class="library-subtitle">Por padrão, os filmes aparecem do mais recente adicionado para o mais antigo.</p>
                    </div>
                </header>

                <div class="library-tools">
                    <label class="filter-control">
                        <span>Gênero</span>
                        <span class="select-shell">
                            <select id="genreFilter"></select>
                        </span>
                    </label>

                    <label class="filter-control">
                        <span>Ordem</span>
                        <span class="select-shell">
                            <select id="sortFilter">
                                <option value="recent">Recentes</option>
                                <option value="alpha">A-Z</option>
                                <option value="year">Ano</option>
                            </select>
                        </span>
                    </label>
                </div>

                <p id="resultSummary" class="result-summary" aria-live="polite"></p>

                <div id="movieGrid" class="movie-grid"></div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest" async onload="window.lucide?.createIcons?.()"></script>
    <script type="module" src="../js/pages/movies.js?v=streaming-20260709a"></script>
</body>
</html>
